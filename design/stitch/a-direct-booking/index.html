<!DOCTYPE html>
<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Villa PMS — Ghi đặt phòng trực tiếp</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#0D9488",
                    secondary: "#F59E0B",
                    available: "#16A34A",
                    booked: "#2563EB",
                    hold: "#DBEAFE",
                    hold_border: "#2563EB",
                    blocked: "#6B7280",
                    not_sellable: "#DC2626"
                },
                borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                fontFamily: {
                    headline: ["Be Vietnam Pro", "sans-serif"],
                    body: ["Be Vietnam Pro", "sans-serif"],
                    label: ["Be Vietnam Pro", "sans-serif"],
                    mono: ["JetBrains Mono", "monospace"]
                }
            }
        }
    }
</script>
<style>
    .diagonal-hatch { background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(107,114,128,0.12) 5px, rgba(107,114,128,0.12) 10px); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    body { min-height: max(884px, 100dvh); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="bg-neutral-50 font-body text-neutral-900 overflow-hidden">

<!-- ===== Calendar layer (dimmed behind the sheet) ===== -->
<header class="bg-white border-b border-neutral-100 shadow-sm w-full top-0 sticky z-30">
<div class="flex items-center justify-between px-4 h-16 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-teal-100 border border-teal-200 flex items-center justify-center text-teal-600">
<span class="material-symbols-outlined text-[20px]">holiday_village</span>
</div>
<h1 class="font-headline font-semibold text-lg text-teal-600">Villa PMS</h1>
</div>
<button class="text-neutral-500"><span class="material-symbols-outlined">notifications</span></button>
</div>
</header>
<main class="relative h-[calc(100vh-64px-80px)] overflow-hidden">
<div class="flex gap-2 overflow-x-auto px-4 py-4 no-scrollbar">
<button class="px-4 py-2 rounded-full border border-neutral-200 bg-white text-sm font-medium whitespace-nowrap">Sonasea V11</button>
<button class="px-4 py-2 rounded-full bg-teal-600 text-white text-sm font-semibold whitespace-nowrap shadow-md">Sonasea V12</button>
<button class="px-4 py-2 rounded-full border border-neutral-200 bg-white text-sm font-medium whitespace-nowrap">Sunset</button>
</div>
<div class="flex items-center justify-between px-4 mb-3">
<h2 class="text-xl font-bold font-headline">Tháng 7, 2026</h2>
</div>
<div class="px-4">
<div class="grid grid-cols-7 gap-1 mb-2 text-center text-xs font-bold text-neutral-400">
<div class="py-1">T2</div><div class="py-1">T3</div><div class="py-1">T4</div><div class="py-1">T5</div><div class="py-1">T6</div><div class="py-1 text-red-400">T7</div><div class="py-1 text-red-400">CN</div>
</div>
<div class="grid grid-cols-7 gap-1">
<div class="h-12"></div><div class="h-12"></div>
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-available bg-white text-sm font-medium">1</div>
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-available bg-white text-sm font-medium">2</div>
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-available bg-white text-sm font-medium">3</div>
<div class="h-12 flex items-center justify-center rounded-lg bg-booked text-white text-sm font-bold">4</div>
<div class="h-12 flex items-center justify-center rounded-lg bg-booked text-white text-sm font-bold">5</div>
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-available bg-white text-sm font-medium">6</div>
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-available bg-white text-sm font-medium">7</div>
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-available bg-white text-sm font-medium">8</div>
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-available bg-white text-sm font-medium">9</div>
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-available bg-white text-sm font-medium">10</div>
<div class="h-12 flex items-center justify-center rounded-lg bg-blocked diagonal-hatch text-neutral-400 text-sm font-medium">11</div>
<div class="h-12 flex items-center justify-center rounded-lg bg-blocked diagonal-hatch text-neutral-400 text-sm font-medium">12</div>
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-available bg-white text-sm font-medium">13</div>
<!-- selected start -->
<div class="h-12 flex items-center justify-center rounded-lg border-2 border-teal-600 bg-teal-50 text-teal-700 text-sm font-bold ring-4 ring-teal-500/20">14</div>
</div>
</div>
</main>

<!-- ===== Backdrop ===== -->
<div class="fixed inset-0 bg-black/40 z-40"></div>

<!-- ===== Bottom Sheet: action chooser collapsed into the record form ===== -->
<div class="fixed inset-x-0 bottom-0 z-50 bg-white rounded-t-[1.75rem] shadow-[0_-10px_40px_rgba(0,0,0,0.18)] max-h-[88vh] overflow-y-auto no-scrollbar">
<div class="flex justify-center pt-3 pb-1"><div class="w-12 h-1.5 bg-neutral-200 rounded-full"></div></div>

<!-- Header: chosen date + the two coexisting actions -->
<div class="px-5 pt-2 pb-3">
<div class="flex items-center gap-3 mb-4">
<div class="w-11 h-11 rounded-xl bg-teal-50 flex items-center justify-center text-teal-600">
<span class="material-symbols-outlined">event_available</span>
</div>
<div>
<p class="text-xs text-neutral-400 font-medium">Đã chọn</p>
<h3 class="text-lg font-bold text-neutral-900">14/07 – 16/07 · 2 đêm</h3>
</div>
</div>

<!-- Two coexisting options: "Khóa ngày" (block) vs "Ghi đặt phòng trực tiếp" (record direct booking, active) -->
<div class="grid grid-cols-2 gap-3 mb-1">
<button class="flex flex-col items-center justify-center gap-1 h-20 rounded-xl border-2 border-neutral-200 bg-white text-neutral-600 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">lock</span>
<span class="text-sm font-semibold">Khóa ngày</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 h-20 rounded-xl border-2 border-teal-600 bg-teal-50 text-teal-700 shadow-sm active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">book_online</span>
<span class="text-sm font-bold leading-tight text-center">Ghi đặt phòng<br/>trực tiếp</span>
</button>
</div>
</div>

<!-- Divider -->
<div class="border-t border-dashed border-neutral-200 mx-5 my-2"></div>

<!-- ===== Record form (active option) ===== -->
<form class="px-5 pb-4 space-y-5">

<!-- Dates (read from selection, tappable to edit) -->
<div>
<label class="text-xs font-bold text-neutral-400 uppercase tracking-wide">Ngày</label>
<div class="mt-2 flex items-center justify-between bg-neutral-50 p-4 rounded-xl border border-neutral-100">
<div class="flex flex-col">
<span class="text-[10px] text-neutral-400 font-bold uppercase tracking-wider mb-0.5">Nhận phòng</span>
<span class="text-lg font-bold">14/07 <span class="text-sm font-medium text-neutral-400">(T2)</span></span>
</div>
<span class="material-symbols-outlined text-neutral-300">east</span>
<div class="flex flex-col items-end">
<span class="text-[10px] text-neutral-400 font-bold uppercase tracking-wider mb-0.5">Trả phòng</span>
<span class="text-lg font-bold">16/07 <span class="text-sm font-medium text-neutral-400">(T4)</span></span>
</div>
</div>
</div>

<!-- Customer name (required, the only required text input) -->
<div>
<label class="text-xs font-bold text-neutral-400 uppercase tracking-wide">Tên khách <span class="text-not_sellable">*</span></label>
<div class="mt-2 flex items-center gap-2 bg-white border border-neutral-200 rounded-xl px-4 h-14 focus-within:ring-2 focus-within:ring-teal-500">
<span class="material-symbols-outlined text-neutral-400">person</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-base font-medium placeholder-neutral-300 p-0" placeholder="Nguyễn Văn A" type="text" value="Trần Minh"/>
</div>
</div>

<!-- Guests stepper -->
<div>
<label class="text-xs font-bold text-neutral-400 uppercase tracking-wide">Số khách</label>
<div class="mt-2 flex items-center justify-between bg-neutral-50 rounded-xl border border-neutral-100 px-3 h-16">
<div class="flex items-center gap-3">
<div class="w-9 h-9 rounded-full bg-teal-50 flex items-center justify-center text-teal-600">
<span class="material-symbols-outlined">groups</span>
</div>
<span class="text-base font-semibold">Khách</span>
</div>
<div class="flex items-center gap-4">
<button type="button" class="w-11 h-11 rounded-full bg-white border border-neutral-200 flex items-center justify-center text-neutral-600 active:scale-90 transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-2xl font-extrabold w-7 text-center tabular-nums">6</span>
<button type="button" class="w-11 h-11 rounded-full bg-teal-600 text-white flex items-center justify-center active:scale-90 transition-transform shadow-sm">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</div>

<!-- Optional: amount received (VND) -->
<div>
<div class="flex items-center justify-between">
<label class="text-xs font-bold text-neutral-400 uppercase tracking-wide">Số tiền nhận</label>
<span class="text-[10px] font-bold text-neutral-400 bg-neutral-100 px-2 py-0.5 rounded-full">Không bắt buộc</span>
</div>
<div class="mt-2 flex items-center gap-2 bg-white border border-neutral-200 rounded-xl px-4 h-14 focus-within:ring-2 focus-within:ring-teal-500">
<span class="material-symbols-outlined text-neutral-400">payments</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-lg font-bold tabular-nums placeholder-neutral-300 p-0" inputmode="numeric" placeholder="0" type="text" value="4.500.000"/>
<span class="text-neutral-400 font-bold">₫</span>
</div>
</div>

<!-- Optional: contact -->
<div>
<div class="flex items-center justify-between">
<label class="text-xs font-bold text-neutral-400 uppercase tracking-wide">Liên hệ</label>
<span class="text-[10px] font-bold text-neutral-400 bg-neutral-100 px-2 py-0.5 rounded-full">Không bắt buộc</span>
</div>
<div class="mt-2 flex items-center gap-2 bg-white border border-neutral-200 rounded-xl px-4 h-14 focus-within:ring-2 focus-within:ring-teal-500">
<span class="material-symbols-outlined text-neutral-400">call</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-base font-medium tabular-nums placeholder-neutral-300 p-0" inputmode="tel" placeholder="09xx xxx xxx" type="tel"/>
</div>
</div>

<!-- Save -->
<button type="submit" class="w-full h-14 bg-teal-600 text-white font-bold text-lg rounded-2xl shadow-lg shadow-teal-900/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2">
<span class="material-symbols-outlined">check_circle</span>
Lưu đặt phòng
</button>
</form>
<div class="h-3 pb-safe"></div>
</div>
</body></html>
