<script>
        // Micro-interaction for gallery thumbnails
        const thumbnails = document.querySelectorAll('.flex-shrink-0');
        thumbnails.forEach(thumb => {
            thumb.addEventListener('click', () => {
                thumbnails.forEach(t => t.classList.remove('active-thumb', 'opacity-100'));
                thumbnails.forEach(t => t.classList.add('opacity-40'));
                thumb.classList.add('active-thumb');
                thumb.classList.remove('opacity-40');
                thumb.classList.add('opacity-100');
            });
        });

        // Simple haptic-like feedback on buttons
        const actionButtons = document.querySelectorAll('button');
        actionButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });
    </script>
