<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Đăng nhập - Villa PMS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#0D9488",
                        secondary: "#F59E0B",
                        surface: "#FFFFFF",
                        border: "#E2E8F0",
                        textMain: "#0F172A"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Be Vietnam Pro"],
                        "display": ["Be Vietnam Pro"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Be Vietnam Pro"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .touch-target {
            min-height: 56px;
        }
        input:focus {
            outline: none;
            border-color: #0D9488;
            box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
<!-- Top Navigation Placeholder (Shell Visibility Rule: Suppressed for Transactional Login) -->
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 max-w-md mx-auto w-full">
<!-- Logo & Brand Anchor -->
<header class="flex flex-col items-center mb-12 animate-fade-in">
<div class="w-16 h-16 bg-teal-600 rounded-2xl flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-white text-4xl" data-icon="holiday_village">holiday_village</span>
</div>
<h1 class="font-headline font-extrabold text-2xl text-teal-600 tracking-tight">Villa PMS</h1>
</header>
<!-- Login Form Canvas -->
<section class="w-full space-y-8">
<div class="text-center">
<h2 class="text-3xl font-bold text-slate-900 mb-2">Đăng nhập</h2>
</div>
<form class="space-y-4" onsubmit="return false;">
<!-- Phone Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 ml-1" for="phone">Số điện thoại</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400" data-icon="phone">phone</span>
</div>
<input class="w-full bg-white border border-slate-200 rounded-xl pl-12 pr-4 touch-target text-lg font-medium transition-all" id="phone" inputmode="numeric" placeholder="Nhập số điện thoại" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 ml-1" for="password">Mật khẩu</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400" data-icon="lock">lock</span>
</div>
<input class="w-full bg-white border border-slate-200 rounded-xl pl-12 pr-12 touch-target text-lg font-medium transition-all" id="password" placeholder="Nhập mật khẩu" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 active:text-teal-600 transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold text-lg rounded-xl touch-target shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Đăng nhập
                    </button>
</div>
</form>
<!-- Secondary Action -->
<div class="text-center pt-4">
<a class="text-slate-600 font-medium hover:text-teal-600 transition-colors" href="#">
                    Chưa có tài khoản? <span class="text-teal-600 font-bold">Đăng ký</span>
</a>
</div>
</section>
<!-- Visual Background Decoration (Not using images as per instructions) -->
<div class="fixed top-0 right-0 -z-10 opacity-10">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="350" cy="50" fill="url(#paint0_radial)" r="150"></circle>
<defs>
<radialgradient cx="0" cy="0" gradienttransform="translate(350 50) rotate(90) scale(150)" gradientunits="userSpaceOnUse" id="paint0_radial" r="1">
<stop stop-color="#0D9488"></stop>
<stop offset="1" stop-color="#0D9488" stop-opacity="0"></stop>
</radialgradient>
</defs>
</svg>
</div>
</main>
<!-- Success Message Toast (Hidden by default) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none flex items-center gap-3" id="toast">
<span class="material-symbols-outlined text-teal-400" data-icon="check_circle">check_circle</span>
<span class="font-medium">Đang đăng nhập...</span>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Simple feedback for demonstration
        document.querySelector('form').addEventListener('submit', function() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
                toast.classList.remove('opacity-100');
            }, 2000);
        });

        // Ensure numeric keypad for phone
        document.getElementById('phone').addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body></html>
