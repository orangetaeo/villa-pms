<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Đăng ký villa - Tiện nghi (Bước 4/5)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0D9488",
              secondary: "#F59E0B",
              available: "#16A34A",
              confirmed: "#2563EB",
              hold: "#DBEAFE",
              blocked: "#6B7280",
              error: "#DC2626"
            },
            borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
            fontFamily: {
              headline: ["Be Vietnam Pro"],
              display: ["Be Vietnam Pro"],
              body: ["Be Vietnam Pro"],
              label: ["Be Vietnam Pro"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: max(884px, 100dvh);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .stepper-btn:active { transform: scale(0.9); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900 min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-white border-b border-neutral-100 shadow-sm z-50 flex items-center justify-between px-4 h-16">
<button class="flex items-center justify-center w-10 h-10 hover:bg-neutral-50 active:opacity-80 transition-opacity rounded-full">
<span class="material-symbols-outlined text-neutral-900" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-semibold text-lg text-neutral-900">Đăng ký villa</h1>
<span class="text-teal-600 font-bold text-sm">Bước 4/5</span>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-4 pt-6 pb-40">
<div class="max-w-md mx-auto space-y-6">
<div class="px-1 flex items-center justify-between">
<h2 class="text-2xl font-bold text-neutral-900">Tiện nghi &amp; đồ dùng</h2>
<span class="text-xs font-semibold text-neutral-400 bg-neutral-100 px-2.5 py-1 rounded-full shrink-0">Không bắt buộc</span>
</div>
<!-- Category Tabs -->
<div class="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
<button class="shrink-0 px-3 py-2.5 rounded-full bg-teal-600 text-white font-semibold text-[13px] shadow-md shadow-teal-600/20">Đồ bếp</button>
<button class="shrink-0 px-3 py-2.5 rounded-full bg-white border-2 border-neutral-100 text-neutral-500 font-semibold text-[13px]">Đồ phòng tắm</button>
<button class="shrink-0 px-3 py-2.5 rounded-full bg-white border-2 border-neutral-100 text-neutral-500 font-semibold text-[13px]">Thiết bị điện</button>
<button class="shrink-0 px-3 py-2.5 rounded-full bg-white border-2 border-neutral-100 text-neutral-500 font-semibold text-[13px]">Minibar</button>
</div>
<!-- Đồ bếp : checkbox tile grid (선택 3) -->
<div class="grid grid-cols-2 gap-3">
<!-- selected -->
<button class="relative flex flex-col items-center justify-center gap-2 p-5 bg-teal-50 border-2 border-teal-600 rounded-xl active:scale-95 transition-transform">
<span class="absolute top-2.5 right-2.5 material-symbols-outlined text-teal-600 text-[20px]" style="font-variation-settings:'FILL' 1;">check_circle</span>
<span class="material-symbols-outlined text-teal-700 text-3xl" data-icon="rice_bowl">rice_bowl</span>
<span class="font-semibold text-sm text-teal-900">Nồi cơm điện</span>
</button>
<!-- selected -->
<button class="relative flex flex-col items-center justify-center gap-2 p-5 bg-teal-50 border-2 border-teal-600 rounded-xl active:scale-95 transition-transform">
<span class="absolute top-2.5 right-2.5 material-symbols-outlined text-teal-600 text-[20px]" style="font-variation-settings:'FILL' 1;">check_circle</span>
<span class="material-symbols-outlined text-teal-700 text-3xl" data-icon="skillet">skillet</span>
<span class="font-semibold text-sm text-teal-900">Chảo</span>
</button>
<button class="relative flex flex-col items-center justify-center gap-2 p-5 bg-white border-2 border-neutral-100 rounded-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-neutral-400 text-3xl" data-icon="cut">cut</span>
<span class="font-semibold text-sm text-neutral-600">Dao &amp; thớt</span>
</button>
<!-- selected -->
<button class="relative flex flex-col items-center justify-center gap-2 p-5 bg-teal-50 border-2 border-teal-600 rounded-xl active:scale-95 transition-transform">
<span class="absolute top-2.5 right-2.5 material-symbols-outlined text-teal-600 text-[20px]" style="font-variation-settings:'FILL' 1;">check_circle</span>
<span class="material-symbols-outlined text-teal-700 text-3xl" data-icon="restaurant">restaurant</span>
<span class="font-semibold text-sm text-teal-900">Bát đĩa</span>
</button>
<button class="relative flex flex-col items-center justify-center gap-2 p-5 bg-white border-2 border-neutral-100 rounded-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-neutral-400 text-3xl" data-icon="local_cafe">local_cafe</span>
<span class="font-semibold text-sm text-neutral-600">Ly cốc</span>
</button>
<button class="relative flex flex-col items-center justify-center gap-2 p-5 bg-white border-2 border-neutral-100 rounded-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-neutral-400 text-3xl" data-icon="kettle">kettle</span>
<span class="font-semibold text-sm text-neutral-600">Ấm đun nước</span>
</button>
<button class="relative flex flex-col items-center justify-center gap-2 p-5 bg-white border-2 border-neutral-100 rounded-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-neutral-400 text-3xl" data-icon="microwave">microwave</span>
<span class="font-semibold text-sm text-neutral-600">Lò vi sóng</span>
</button>
<button class="relative flex flex-col items-center justify-center gap-2 p-5 bg-white border-2 border-neutral-100 rounded-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined text-neutral-400 text-3xl" data-icon="grocery">grocery</span>
<span class="font-semibold text-sm text-neutral-600">Gia vị</span>
</button>
</div>
<!-- Tham khảo : tab Minibar (디자인 참고 — 변환 시 탭 전환 콘텐츠) -->
<div class="border-t-2 border-dashed border-neutral-200 pt-5 space-y-3">
<p class="text-xs font-semibold text-neutral-400 px-1">Tham khảo — tab Minibar</p>
<!-- Nước suối -->
<section class="flex items-center justify-between bg-white p-4 rounded-xl border-2 border-neutral-100">
<div class="flex items-center gap-3">
<div class="w-11 h-11 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="water_drop">water_drop</span>
</div>
<span class="font-semibold text-neutral-800">Nước suối</span>
</div>
<div class="flex items-center gap-3">
<button class="stepper-btn w-11 h-11 rounded-full border-2 border-teal-600 text-teal-600 flex items-center justify-center transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-2xl font-bold w-8 text-center">4</span>
<button class="stepper-btn w-11 h-11 rounded-full bg-teal-600 text-white flex items-center justify-center transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<!-- Nước ngọt -->
<section class="flex items-center justify-between bg-white p-4 rounded-xl border-2 border-neutral-100">
<div class="flex items-center gap-3">
<div class="w-11 h-11 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="local_drink">local_drink</span>
</div>
<span class="font-semibold text-neutral-800">Nước ngọt</span>
</div>
<div class="flex items-center gap-3">
<button class="stepper-btn w-11 h-11 rounded-full border-2 border-teal-600 text-teal-600 flex items-center justify-center transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-2xl font-bold w-8 text-center">2</span>
<button class="stepper-btn w-11 h-11 rounded-full bg-teal-600 text-white flex items-center justify-center transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<!-- Bia -->
<section class="flex items-center justify-between bg-white p-4 rounded-xl border-2 border-neutral-100">
<div class="flex items-center gap-3">
<div class="w-11 h-11 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="sports_bar">sports_bar</span>
</div>
<span class="font-semibold text-neutral-800">Bia</span>
</div>
<div class="flex items-center gap-3">
<button class="stepper-btn w-11 h-11 rounded-full border-2 border-neutral-200 text-neutral-300 flex items-center justify-center transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-2xl font-bold w-8 text-center text-neutral-300">0</span>
<button class="stepper-btn w-11 h-11 rounded-full bg-teal-600 text-white flex items-center justify-center transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<!-- Bánh kẹo -->
<section class="flex items-center justify-between bg-white p-4 rounded-xl border-2 border-neutral-100">
<div class="flex items-center gap-3">
<div class="w-11 h-11 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="cookie">cookie</span>
</div>
<span class="font-semibold text-neutral-800">Bánh kẹo</span>
</div>
<div class="flex items-center gap-3">
<button class="stepper-btn w-11 h-11 rounded-full border-2 border-teal-600 text-teal-600 flex items-center justify-center transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-2xl font-bold w-8 text-center">3</span>
<button class="stepper-btn w-11 h-11 rounded-full bg-teal-600 text-white flex items-center justify-center transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 w-full z-50 bg-white border-t border-neutral-100 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] pb-safe">
<div class="flex flex-col items-center gap-2 px-4 py-3 pb-6 w-full max-w-md mx-auto">
<button class="flex items-center justify-center gap-2 bg-teal-600 text-white rounded-xl h-14 w-full shadow-lg shadow-teal-600/20 active:scale-95 transition-transform duration-150 group">
<span class="font-label font-bold text-sm">Tiếp tục</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<a class="text-sm font-semibold text-neutral-400 py-2 active:opacity-70" href="#">Bỏ qua bước này</a>
</div>
</footer>
</body></html>
