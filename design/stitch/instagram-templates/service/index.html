<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VILLA GO · Instagram Service Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       VILLA GO — Instagram SERVICE (부가서비스) overlay (1080 x 1350)
       Top category label pill + bottom "카톡 문의 시 견적" line.
       NO price (마진 비공개 원칙). satori-safe: flexbox + absolute only.
       ============================================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; background: #111; }

    .artboard {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      font-family: 'Public Sans', 'Pretendard', sans-serif;
    }

    .photo {
      position: absolute; top: 0; left: 0;
      width: 1080px; height: 1350px;
      object-fit: cover;
    }
    .scrim-top {
      position: absolute; top: 0; left: 0;
      width: 1080px; height: 400px;
      background: linear-gradient(to bottom, rgba(10,17,20,0.5) 0%, rgba(10,17,20,0) 100%);
    }
    .scrim-bottom {
      position: absolute; bottom: 0; left: 0;
      width: 1080px; height: 480px;
      background: linear-gradient(to top, rgba(10,17,20,0.82) 0%, rgba(10,17,20,0.45) 46%, rgba(10,17,20,0) 100%);
    }

    /* --- top: category label pill --- */
    .top {
      position: relative;
      display: flex;
      flex-direction: row;
      padding: 84px 84px 0 84px;
    }
    .label-pill {
      display: flex;
      align-items: center;
      padding: 22px 40px;
      border-radius: 999px;
      background: #0D9488;
    }
    .label-dot {
      display: flex;
      width: 14px; height: 14px;
      margin-right: 18px;
      border-radius: 999px;
      background: #F59E0B;
    }
    .label-text {
      font-size: 34px;
      font-weight: 700;
      color: #FFF9F0;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    /* --- bottom: CTA copy + brand --- */
    .bottom {
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 0 84px 96px 84px;
    }
    .cta-copy {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 60px;
      font-weight: 800;
      line-height: 1.3;
      color: #FFF9F0;
      letter-spacing: -0.02em;
      word-break: keep-all;
      text-shadow: 0 3px 14px rgba(0,0,0,0.42);
    }
    .cta-sub {
      display: flex;
      margin-top: 26px;
      align-items: center;
    }
    .kakao-tag {
      display: flex;
      align-items: center;
      padding: 16px 30px;
      border-radius: 999px;
      background: #FEE500;
    }
    .kakao-tag-text {
      font-size: 30px;
      font-weight: 700;
      color: #191600;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .brand {
      margin-left: 28px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: #FFF9F0;
      opacity: 0.92;
    }
  </style>
</head>
<body>
  <div class="artboard">
    <img class="photo" src="https://picsum.photos/seed/villagomassage/1080/1350" alt="service" data-inject="photoUrl">

    <div class="scrim-top"></div>
    <div class="scrim-bottom"></div>

    <div class="top">
      <div class="label-pill">
        <div class="label-dot"></div>
        <div class="label-text" data-inject="serviceLabel">빌라로 찾아오는 출장 마사지</div>
      </div>
    </div>

    <div class="bottom">
      <div class="cta-copy" data-inject="serviceHeadline">장보기부터 세팅까지,<br>손 하나 안 대셔도 됩니다</div>
      <div class="cta-sub">
        <div class="kakao-tag">
          <div class="kakao-tag-text" data-inject="serviceCtaText">카톡 문의 시 견적 안내</div>
        </div>
        <div class="brand" data-inject="brandName">VILLA GO</div>
      </div>
    </div>
  </div>
</body>
</html>
