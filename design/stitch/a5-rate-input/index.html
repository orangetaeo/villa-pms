<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng ký villa - Bước 4/4</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0D9488", // teal-600
              secondary: "#F59E0B", // amber-500
              available: "#16A34A",
              blocked: "#6B7280",
              notSellable: "#DC2626"
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "1rem",
              "xl": "1.5rem",
              "full": "9999px"
            },
            fontFamily: {
              "headline": ["Be Vietnam Pro"],
              "display": ["Be Vietnam Pro"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            }
          }
        }
      }
    </script>
<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .season-card.active {
            border-color: #0D9488;
            background-color: #F0FDFA;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .numeric-keypad-btn:active {
            background-color: #E2E8F0;
            transform: scale(0.95);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
<!-- TopAppBar (from JSON guidance) -->
<header class="fixed top-0 w-full z-50 bg-white dark:bg-slate-900 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between px-4 h-14">
<button aria-label="Back" class="active:opacity-70 transition-opacity p-2 -ml-2">
<span class="material-symbols-outlined text-teal-600 dark:text-teal-400">arrow_back</span>
</button>
<h1 class="font-headline font-semibold text-lg text-teal-600">Đăng ký villa</h1>
<div class="text-xs font-semibold bg-teal-50 text-teal-700 px-3 py-1 rounded-full">
            Bước 4/4
        </div>
</header>
<!-- Main Content Area -->
<main class="flex-1 mt-14 pb-[420px] px-4 pt-6 max-w-md mx-auto w-full">
<!-- Headline Section -->
<div class="mb-8">
<h2 class="text-2xl font-bold text-slate-800 leading-tight">Giá gốc mỗi đêm</h2>
<p class="text-slate-500 mt-1">Nhập giá bạn nhận cho mỗi đêm, theo từng mùa.</p>
</div>
<!-- Season Cards Stack -->
<div class="space-y-4">
<!-- Low Season -->
<div class="season-card active border-2 border-transparent bg-white p-4 rounded-xl flex items-center justify-between transition-all duration-200 cursor-pointer" data-season="low" onclick="setActiveSeason(this, 'low')">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center">
<span class="material-symbols-outlined text-available">dual_screen</span>
</div>
<div>
<p class="text-sm font-semibold text-slate-700">Mùa thấp điểm</p>
<p class="text-xs text-slate-400">T5 - T9 hàng năm</p>
</div>
</div>
<div class="text-right">
<span class="text-lg font-bold text-teal-600" id="price-low">2.500.000₫</span>
</div>
</div>
<!-- High Season -->
<div class="season-card border-2 border-transparent bg-white p-4 rounded-xl flex items-center justify-between transition-all duration-200 cursor-pointer" data-season="high" onclick="setActiveSeason(this, 'high')">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">sunny</span>
</div>
<div>
<p class="text-sm font-semibold text-slate-700">Mùa cao điểm</p>
<p class="text-xs text-slate-400">T10 - T4 hàng năm</p>
</div>
</div>
<div class="text-right">
<span class="text-lg font-bold text-slate-400" id="price-high">3.500.000₫</span>
</div>
</div>
<!-- Peak/Holiday Season -->
<div class="season-card border-2 border-transparent bg-white p-4 rounded-xl flex items-center justify-between transition-all duration-200 cursor-pointer" data-season="peak" onclick="setActiveSeason(this, 'peak')">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center">
<span class="material-symbols-outlined text-notSellable">celebration</span>
</div>
<div>
<p class="text-sm font-semibold text-slate-700">Cao điểm lễ Tết</p>
<p class="text-xs text-slate-400">Lễ hội &amp; Tết Nguyên Đán</p>
</div>
</div>
<div class="text-right">
<div class="flex flex-col items-end"><span class="text-lg font-bold text-slate-300" id="price-peak">0₫</span><span class="text-[10px] text-notSellable font-semibold">Chưa nhập giá</span></div>
</div>
</div>
</div>
<!-- Decorative Info Card -->
</main>
<!-- Fixed Bottom Controls Cluster -->
<div class="fixed bottom-0 left-0 w-full bg-white shadow-[0_-8px_20px_rgba(0,0,0,0.05)] rounded-t-3xl z-50 pt-4 pb-safe border-t border-slate-100">
<!-- Primary Action Button -->
<div class="px-4 mb-4">
<button class="w-full hover:bg-teal-700 active:scale-[0.98] transition-all text-white font-bold py-4 rounded-xl text-lg shadow-lg bg-slate-300" disabled="true">
                Hoàn tất &amp; Gửi duyệt
            </button>
</div>
<!-- Large Numeric Keypad -->
<div class="grid grid-cols-3 gap-px bg-slate-100 border-t border-slate-100">
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('1')">1</button>
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('2')">2</button>
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('3')">3</button>
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('4')">4</button>
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('5')">5</button>
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('6')">6</button>
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('7')">7</button>
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('8')">8</button>
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('9')">9</button>
<button class="numeric-keypad-btn bg-slate-50 py-4 text-2xl font-semibold text-slate-400">.</button>
<button class="numeric-keypad-btn bg-white py-4 text-2xl font-semibold text-slate-700" onclick="handleKey('0')">0</button>
<button class="numeric-keypad-btn bg-slate-50 py-4 text-slate-700 flex items-center justify-center" onclick="handleKey('del')">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</div>
<script>
        let activeSeason = 'low';
        const prices = {
            low: "2500000",
            high: "3500000",
            peak: "0"
        };

        function setActiveSeason(element, season) {
            document.querySelectorAll('.season-card').forEach(card => {
                card.classList.remove('active');
                const s = card.getAttribute('data-season');
                const priceSpan = card.querySelector(`#price-${s}`);
                priceSpan.classList.remove('text-teal-600');
                priceSpan.classList.add('text-slate-400');
                if (s === 'peak' && prices[s] === '0') priceSpan.classList.add('text-slate-300');
            });

            element.classList.add('active');
            activeSeason = season;
            const activePriceSpan = element.querySelector(`#price-${season}`);
            activePriceSpan.classList.add('text-teal-600');
            activePriceSpan.classList.remove('text-slate-400', 'text-slate-300');
        }

        function formatVND(value) {
            if (!value || value === '0') return '0₫';
            return parseInt(value).toLocaleString('vi-VN') + '₫';
        }

        function handleKey(key) {
            let currentVal = prices[activeSeason];

            if (key === 'del') {
                prices[activeSeason] = currentVal.slice(0, -1) || '0';
            } else {
                if (currentVal === '0') {
                    prices[activeSeason] = key;
                } else {
                    if (currentVal.length < 12) { // Limit length
                        prices[activeSeason] += key;
                    }
                }
            }

            // Update UI
            const priceDisplay = document.getElementById(`price-${activeSeason}`);
            priceDisplay.innerText = formatVND(prices[activeSeason]);
            
            // Visual feedback for non-zero peak
            if (activeSeason === 'peak' && prices[activeSeason] !== '0') {
                priceDisplay.classList.remove('text-slate-300');
                priceDisplay.classList.add('text-teal-600');
            }
        }
    </script>
</body></html>
