<!DOCTYPE html>
<!--
  b17-statistics-mobile — 통계화면 모바일 변형 (390px, 탭1 개요 기준)
  T-admin-statistics §5 / 본 작업 산출물 §1. <768 차트 세로 스택. b1-mobile 규칙 준용.
  햄버거 + 탭은 가로 스크롤 칩, KPI 2x2, 차트 세로 스택. 통화 분리·환율 참고 라벨 유지.
-->
<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>통계 (모바일) · Villa PMS Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: "Public Sans", "Noto Sans KR", sans-serif; word-break: keep-all; }
    button, .tabular-nums, span[class*="rounded"] { white-space: nowrap; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .chart-grid {
        background-image:
            linear-gradient(to right, #33415533 1px, transparent 1px),
            linear-gradient(to top, #33415533 1px, transparent 1px);
        background-size: 16.6% 25%;
    }
    .bar-krw { background: linear-gradient(to top, #3B82F6, #60A5FA); }
    .bar-vnd { background: linear-gradient(to top, #10B981, #34D399); }
</style>
</head>
<body class="bg-[#0F172A] text-slate-200 antialiased">
<div class="max-w-[390px] mx-auto min-h-screen flex flex-col border-x border-slate-800">

<!-- 모바일 헤더: 햄버거 + 브랜드 + 벨 -->
<header class="sticky top-0 z-40 bg-[#0F172A] border-b border-slate-800 flex items-center justify-between h-14 px-4">
<div class="flex items-center gap-3">
<button class="text-slate-300"><span class="material-symbols-outlined">menu</span></button>
<div><h1 class="text-base font-black text-white leading-none">Villa PMS</h1><p class="text-[9px] text-slate-500 uppercase tracking-widest">Villa PMS Admin</p></div>
</div>
<button class="text-slate-400 relative"><span class="material-symbols-outlined">notifications</span><span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-[#0F172A]"></span></button>
</header>

<!-- 화면 제목 + 기간 -->
<div class="px-4 pt-4 pb-2 flex items-center justify-between">
<h2 class="text-lg font-bold text-white flex items-center gap-2"><span class="material-symbols-outlined text-[#3B82F6]">analytics</span>통계</h2>
<button class="flex items-center gap-1 text-xs text-slate-300 bg-slate-900 border border-slate-800 rounded-lg px-2.5 py-1.5">최근 6개월 <span class="material-symbols-outlined text-sm">expand_more</span></button>
</div>

<!-- 탭: 가로 스크롤 칩 -->
<div class="px-4 pb-3 flex gap-2 overflow-x-auto no-scrollbar">
<button class="shrink-0 px-3 py-1.5 rounded-full text-xs font-bold bg-[#3B82F6] text-white">개요</button>
<button class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium bg-slate-800 text-slate-400">가동률</button>
<button class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium bg-slate-800 text-slate-400">빌라 성과</button>
<button class="shrink-0 px-3 py-1.5 rounded-full text-xs font-medium bg-slate-800 text-slate-400">운영지표</button>
</div>

<div class="flex-1 overflow-y-auto px-4 pb-8 space-y-4">
<!-- 기준 안내 -->
<p class="text-[10px] text-slate-500 flex items-start gap-1"><span class="material-symbols-outlined text-xs mt-px">info</span>통화별 분리 집계 — KRW·VND 합산하지 않음</p>

<!-- KPI 2x2 -->
<div class="grid grid-cols-2 gap-3">
<div class="bg-[#1E293B] p-3 rounded-xl border-l-4 border-l-[#3B82F6] border border-slate-700/50">
<span class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">KRW 매출</span>
<div class="mt-1 flex items-baseline gap-0.5"><span class="text-xl font-bold text-white tabular-nums">12.45M</span><span class="text-[10px] text-slate-400">원</span></div>
<span class="text-[10px] text-emerald-400 font-bold flex items-center"><span class="material-symbols-outlined text-xs">arrow_drop_up</span>18.2%</span>
</div>
<div class="bg-[#1E293B] p-3 rounded-xl border-l-4 border-l-[#10B981] border border-slate-700/50">
<span class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">VND 매출</span>
<div class="mt-1 flex items-baseline gap-0.5"><span class="text-xl font-bold text-white tabular-nums">86.2M</span><span class="text-[10px] text-slate-400">₫</span></div>
<span class="text-[10px] text-emerald-400 font-bold flex items-center"><span class="material-symbols-outlined text-xs">arrow_drop_up</span>9.5%</span>
</div>
<div class="bg-[#1E293B] p-3 rounded-xl border border-slate-700/50">
<span class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">환산 마진</span>
<div class="mt-1 flex items-baseline gap-0.5"><span class="text-xl font-bold text-white tabular-nums">31.6M</span><span class="text-[10px] text-slate-400">₫</span></div>
<span class="text-[9px] text-amber-400/80 bg-amber-500/10 px-1 py-0.5 rounded inline-flex items-center gap-0.5 mt-1"><span class="material-symbols-outlined text-[10px]">currency_exchange</span>환율 스냅샷 참고</span>
</div>
<div class="bg-[#1E293B] p-3 rounded-xl border border-slate-700/50">
<span class="text-[10px] font-medium text-slate-400 uppercase tracking-wider">평균 마진율</span>
<div class="mt-1 flex items-baseline gap-0.5"><span class="text-xl font-bold text-white tabular-nums">26.8</span><span class="text-[10px] text-slate-400">%</span></div>
<span class="text-[10px] text-red-400 font-bold flex items-center"><span class="material-symbols-outlined text-xs">arrow_drop_down</span>1.3%p</span>
</div>
</div>

<!-- 월별 매출 추이 (세로 스택 1) -->
<div class="bg-[#1E293B] rounded-xl border border-slate-700/50 p-4">
<h3 class="font-bold text-white text-sm mb-1">월별 매출 추이</h3>
<div class="flex items-center gap-3 text-[10px] mb-3">
<span class="flex items-center gap-1 text-slate-300"><span class="w-2.5 h-2.5 rounded-sm bg-[#3B82F6]"></span>KRW</span>
<span class="flex items-center gap-1 text-slate-300"><span class="w-2.5 h-2.5 rounded-sm bg-[#10B981]"></span>VND</span>
</div>
<div class="h-40 flex items-end justify-between gap-2 chart-grid px-2" data-recharts="BarChart krw/vnd">
<div class="flex-1 flex items-end justify-center gap-1 h-full"><div class="bar-krw w-3 rounded-t" style="height:42%"></div><div class="bar-vnd w-3 rounded-t" style="height:55%"></div></div>
<div class="flex-1 flex items-end justify-center gap-1 h-full"><div class="bar-krw w-3 rounded-t" style="height:50%"></div><div class="bar-vnd w-3 rounded-t" style="height:48%"></div></div>
<div class="flex-1 flex items-end justify-center gap-1 h-full"><div class="bar-krw w-3 rounded-t" style="height:38%"></div><div class="bar-vnd w-3 rounded-t" style="height:62%"></div></div>
<div class="flex-1 flex items-end justify-center gap-1 h-full"><div class="bar-krw w-3 rounded-t" style="height:60%"></div><div class="bar-vnd w-3 rounded-t" style="height:58%"></div></div>
<div class="flex-1 flex items-end justify-center gap-1 h-full"><div class="bar-krw w-3 rounded-t" style="height:55%"></div><div class="bar-vnd w-3 rounded-t" style="height:70%"></div></div>
<div class="flex-1 flex items-end justify-center gap-1 h-full"><div class="bar-krw w-3 rounded-t ring-1 ring-blue-300" style="height:72%"></div><div class="bar-vnd w-3 rounded-t ring-1 ring-emerald-300" style="height:84%"></div></div>
</div>
<div class="flex justify-between px-2 pt-1.5 text-[9px] text-slate-500 tabular-nums">
<span class="flex-1 text-center">01</span><span class="flex-1 text-center">02</span><span class="flex-1 text-center">03</span><span class="flex-1 text-center">04</span><span class="flex-1 text-center">05</span><span class="flex-1 text-center text-white font-bold">06</span>
</div>
</div>

<!-- 채널 도넛 (세로 스택 2) -->
<div class="bg-[#1E293B] rounded-xl border border-slate-700/50 p-4">
<div class="flex items-center justify-between mb-3">
<h3 class="font-bold text-white text-sm">채널별 비중</h3>
<div class="flex items-center gap-0.5 bg-slate-900 rounded-lg p-0.5 border border-slate-800 text-[10px]">
<button class="px-2 py-0.5 rounded bg-[#3B82F6] text-white font-bold">건수</button>
<button class="px-2 py-0.5 rounded text-slate-400 font-medium">매출</button>
</div>
</div>
<div class="flex items-center gap-4">
<div class="relative w-28 h-28 rounded-full shrink-0" style="background: conic-gradient(#3B82F6 0% 48%, #10B981 48% 80%, #F59E0B 80% 100%);">
<div class="absolute inset-[24%] rounded-full bg-[#1E293B] flex flex-col items-center justify-center"><span class="text-lg font-bold text-white tabular-nums">48</span><span class="text-[8px] text-slate-500">건</span></div>
</div>
<div class="flex-1 space-y-1.5 text-[11px]">
<div class="flex items-center justify-between"><span class="flex items-center gap-1.5 text-slate-300"><span class="w-2 h-2 rounded-sm bg-[#3B82F6]"></span>여행사</span><span class="text-slate-400 tabular-nums">48%</span></div>
<div class="flex items-center justify-between"><span class="flex items-center gap-1.5 text-slate-300"><span class="w-2 h-2 rounded-sm bg-[#10B981]"></span>랜드사</span><span class="text-slate-400 tabular-nums">32%</span></div>
<div class="flex items-center justify-between"><span class="flex items-center gap-1.5 text-slate-300"><span class="w-2 h-2 rounded-sm bg-[#F59E0B]"></span>직접</span><span class="text-slate-400 tabular-nums">20%</span></div>
</div>
</div>
</div>
</div>

</div>
</body></html>
