<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        kakao: "#FEE500",
                        teal: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                            950: '#042f2e',
                        }
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Be Vietnam Pro", "Noto Sans KR", "sans-serif"],
                        "display": ["Be Vietnam Pro", "Noto Sans KR", "sans-serif"],
                        "body": ["Be Vietnam Pro", "Noto Sans KR", "sans-serif"],
                        "label": ["Be Vietnam Pro", "Noto Sans KR", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .kakao-btn-shadow {
            box-shadow: 0 4px 12px rgba(254, 229, 0, 0.2);
        }
    
        /* DESIGN 공통 규칙 (2026-06-11): 한글 폰트 폴백 + 한국어 단어 낙하 방지 */
        body { font-family: "Be Vietnam Pro", "Noto Sans KR", sans-serif; word-break: keep-all; }
        button, .tabular-nums, span[class*="rounded"] { white-space: nowrap; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head><body class="bg-neutral-50 text-neutral-900 min-h-screen flex flex-col items-center">
<!-- Top AppBar -->
<header class="bg-white dark:bg-neutral-900 border-b border-neutral-100 dark:border-neutral-800 flex justify-between items-center w-full px-4 h-14 sticky top-0 z-50">
<div class="flex items-center">
<span class="text-teal-600 font-headline font-bold text-xl">Villa PMS</span>
</div>
<div class="flex gap-2">
<button class="text-neutral-500 hover:bg-neutral-50 dark:hover:bg-neutral-800 p-2 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
</header>
<main class="w-full max-w-md px-6 py-12 space-y-32 flex-grow">
<!-- Section 1: Expired State (만료) -->
<section class="flex flex-col items-center text-center animate-fadeIn">
<div class="relative mb-8">
<div class="w-24 h-24 bg-neutral-100 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-neutral-400 text-5xl" data-icon="history">history</span>
</div>
<div class="absolute -bottom-1 -right-1 bg-white p-1 rounded-full border border-neutral-100">
<span class="material-symbols-outlined text-neutral-400 text-xl" data-icon="timer_off">timer_off</span>
</div>
</div>
<h2 class="text-2xl font-headline font-semibold text-neutral-900 mb-4 tracking-tight">제안이 만료되었습니다</h2>
<p class="text-neutral-500 font-body leading-relaxed mb-10 px-4">
                제안 유효기간이 지나 더 이상 열람할 수 없습니다.<br/>
                담당자에게 새 제안을 요청해 주세요.
            </p>
<div class="w-full space-y-3">
<button class="w-full h-14 bg-kakao text-[#3C1E1E] font-bold rounded-xl flex items-center justify-center gap-2 kakao-btn-shadow transition-transform active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                    카카오톡으로 문의
                </button>
<button class="w-full h-14 border border-neutral-200 text-neutral-700 font-semibold rounded-xl flex items-center justify-center gap-2 bg-white hover:bg-neutral-50 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="call">call</span>
                    전화 연결
                </button>
</div>
</section>
<!-- Visual Divider -->
<div class="h-px w-full bg-gradient-to-r from-transparent via-neutral-200 to-transparent"></div>
<!-- Section 2: Closed/Booked State (마감) -->
<section class="flex flex-col items-center text-center animate-fadeIn">
<div class="relative mb-8">
<div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-red-400 text-5xl" data-icon="calendar_month" style="font-variation-settings: 'FILL' 0;">calendar_month</span>
</div>
<div class="absolute -bottom-1 -right-1 bg-white p-1 rounded-full border border-red-50">
<span class="material-symbols-outlined text-red-500 text-xl" data-icon="cancel" style="font-variation-settings: 'FILL' 1;">cancel</span>
</div>
</div>
<h2 class="text-2xl font-headline font-semibold text-neutral-900 mb-4 tracking-tight">이미 마감되었습니다</h2>
<p class="text-neutral-500 font-body leading-relaxed mb-10 px-4">
                선택하신 날짜의 빌라 예약이 마감되었습니다.<br/>
                다른 날짜로 다시 제안받으실 수 있습니다.
            </p>
<div class="w-full space-y-3">
<button class="w-full h-14 bg-kakao text-[#3C1E1E] font-bold rounded-xl flex items-center justify-center gap-2 kakao-btn-shadow transition-transform active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
                    카카오톡으로 문의
                </button>
<button class="w-full h-14 border border-neutral-200 text-neutral-700 font-semibold rounded-xl flex items-center justify-center gap-2 bg-white hover:bg-neutral-50 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="call">call</span>
                    전화 연결
                </button>
</div>
</section>
</main>
<!-- Footer (with updated Korean links) -->
<footer class="w-full px-6 py-12 flex flex-col gap-4 text-center bg-neutral-50 dark:bg-neutral-950 border-t border-neutral-200 dark:border-neutral-800">
<div class="font-headline font-bold text-neutral-900 text-lg">Villa PMS</div>
<p class="font-body text-sm text-neutral-500">© 2026 Villa PMS Phu Quoc. All rights reserved.</p>
<div class="flex justify-center gap-4 text-sm font-body">
<a class="text-neutral-500 hover:text-teal-600 transition-colors" href="#">이용약관</a>
<a class="text-neutral-500 hover:text-teal-600 transition-colors" href="#">개인정보처리방침</a>
<a class="text-neutral-500 hover:text-teal-600 transition-colors" href="#">보증금 정책</a>
</div>
</footer>
<!-- Decorative background elements -->
<div class="fixed top-20 right-[-10%] w-64 h-64 bg-teal-50 rounded-full blur-3xl opacity-50 -z-10"></div>
<div class="fixed bottom-40 left-[-10%] w-72 h-72 bg-orange-50 rounded-full blur-3xl opacity-40 -z-10"></div>
<script>
        // Simple entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            const sections = document.querySelectorAll('section');
            sections.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
                el.style.transitionDelay = `${index * 0.2}s`;

                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100);
            });
        });
    </script>
</body></html>
