<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0D9488",
              secondary: "#F59E0B",
              available: "#16A34A",
              confirmed: "#2563EB",
              hold: "#DBEAFE",
              blocked: "#6B7280",
              error: "#DC2626"
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "1rem",
              "xl": "1.5rem",
              "full": "9999px"
            },
            fontFamily: {
              headline: ["Be Vietnam Pro"],
              display: ["Be Vietnam Pro"],
              body: ["Be Vietnam Pro"],
              label: ["Be Vietnam Pro"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .stepper-btn:active {
            transform: scale(0.9);
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-neutral-50 text-neutral-900 min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-white dark:bg-neutral-900 border-b border-neutral-100 dark:border-neutral-800 shadow-sm z-50 flex items-center justify-between px-4 h-16">
<button class="flex items-center justify-center w-10 h-10 hover:bg-neutral-50 active:opacity-80 transition-opacity rounded-full">
<span class="material-symbols-outlined text-neutral-900" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-semibold text-lg text-neutral-900">Đăng ký villa</h1>
<span class="text-teal-600 dark:text-teal-400 font-bold text-sm">Bước 1/4</span>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-4 pt-6 pb-32">
<div class="max-w-md mx-auto space-y-8">
<h2 class="text-2xl font-bold text-neutral-900 px-1">Thông tin cơ bản</h2>
<!-- Villa Name Section -->
<section class="space-y-3">
<label class="block font-semibold text-neutral-700 text-sm px-1" for="villa-name">Tên villa</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-white border-2 border-neutral-100 focus:border-teal-600 focus:ring-0 rounded-xl text-lg font-medium transition-colors" id="villa-name" placeholder="Sonasea V12" type="text"/>
</div>
</section>
<!-- Complex Section -->
<section class="space-y-3">
<label class="block font-semibold text-neutral-700 text-sm px-1" for="complex-select">Khu</label>
<div class="relative">
<select class="w-full h-14 px-4 bg-white border-2 border-neutral-100 focus:border-teal-600 focus:ring-0 rounded-xl text-lg font-medium appearance-none transition-colors" id="complex-select">
<option value="sonasea">Sonasea</option>
<option value="sunset-sanato">Sunset Sanato</option>
<option value="vinpearl">Vinpearl</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-neutral-400">expand_more</span>
</div>
</div>
</section>
<!-- Steppers Grid -->
<div class="grid grid-cols-1 gap-6">
<!-- Bedrooms -->
<section class="flex items-center justify-between bg-white p-5 rounded-xl border-2 border-neutral-100">
<div>
<h3 class="font-semibold text-neutral-800">Phòng ngủ</h3>
<p class="text-xs text-neutral-400">Tổng số phòng ngủ riêng</p>
</div>
<div class="flex items-center gap-4">
<button class="stepper-btn w-12 h-12 rounded-full border-2 border-teal-600 text-teal-600 flex items-center justify-center transition-transform" onclick="decrement('bedroom-val')">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-2xl font-bold w-6 text-center" id="bedroom-val">3</span>
<button class="stepper-btn w-12 h-12 rounded-full bg-teal-600 text-white flex items-center justify-center transition-transform" onclick="increment('bedroom-val')">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<!-- Bathrooms -->
<section class="flex items-center justify-between bg-white p-5 rounded-xl border-2 border-neutral-100">
<div>
<h3 class="font-semibold text-neutral-800">Phòng tắm</h3>
<p class="text-xs text-neutral-400">Có bình nóng lạnh/vòi sen</p>
</div>
<div class="flex items-center gap-4">
<button class="stepper-btn w-12 h-12 rounded-full border-2 border-teal-600 text-teal-600 flex items-center justify-center transition-transform" onclick="decrement('bath-val')">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-2xl font-bold w-6 text-center" id="bath-val">2</span>
<button class="stepper-btn w-12 h-12 rounded-full bg-teal-600 text-white flex items-center justify-center transition-transform" onclick="increment('bath-val')">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<!-- Max Guests -->
<section class="flex items-center justify-between bg-white p-5 rounded-xl border-2 border-neutral-100">
<div>
<h3 class="font-semibold text-neutral-800">Số khách tối đa</h3>
<p class="text-xs text-neutral-400">Bao gồm cả trẻ em</p>
</div>
<div class="flex items-center gap-4">
<button class="stepper-btn w-12 h-12 rounded-full border-2 border-teal-600 text-teal-600 flex items-center justify-center transition-transform" onclick="decrement('guest-val')">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-2xl font-bold w-6 text-center" id="guest-val">6</span>
<button class="stepper-btn w-12 h-12 rounded-full bg-teal-600 text-white flex items-center justify-center transition-transform" onclick="increment('guest-val')">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
</div>
<!-- Amenities Toggles -->
<div class="space-y-4">
<h3 class="font-semibold text-neutral-700 text-sm px-1">Tiện ích cơ bản</h3>
<label class="flex items-center justify-between p-5 bg-white rounded-xl border-2 border-neutral-100 cursor-pointer active:bg-neutral-50 transition-colors">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="pool">pool</span>
</div>
<span class="font-medium text-neutral-800">Hồ bơi</span>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-neutral-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-teal-600"></div>
</div>
</label>
<label class="flex items-center justify-between p-5 bg-white rounded-xl border-2 border-neutral-100 cursor-pointer active:bg-neutral-50 transition-colors">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="breakfast_dining">breakfast_dining</span>
</div>
<span class="font-medium text-neutral-800">Bữa sáng</span>
</div>
<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-neutral-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-teal-600"></div>
</div>
</label>
</div>
</div>
</main>
<!-- BottomNavBar as Floating Action Area -->
<footer class="fixed bottom-0 w-full z-50 bg-white dark:bg-neutral-900 border-t border-neutral-100 dark:border-neutral-800 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] pb-safe">
<div class="flex justify-around items-center px-4 py-3 pb-8 w-full max-w-md mx-auto">
<button class="flex flex-col items-center justify-center text-neutral-400 h-14 w-1/3 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label font-medium text-xs mt-1">Trang chủ</span>
</button>
<button class="flex flex-col items-center justify-center bg-teal-600 text-white rounded-xl h-14 w-2/3 ml-4 shadow-lg shadow-teal-600/20 active:scale-95 transition-transform duration-150 group">
<div class="flex items-center justify-center gap-2">
<span class="font-label font-bold text-sm">Tiếp tục</span>
<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
</div>
</footer>
<script>
        function increment(id) {
            const el = document.getElementById(id);
            let val = parseInt(el.innerText);
            el.innerText = val + 1;
        }

        function decrement(id) {
            const el = document.getElementById(id);
            let val = parseInt(el.innerText);
            if (val > 0) {
                el.innerText = val - 1;
            }
        }
    </script>
</body></html>
