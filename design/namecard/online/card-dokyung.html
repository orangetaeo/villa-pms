  .htag{margin-top:14px;font-size:13px;color:rgba(255,255,255,.85);letter-spacing:.01em}
  .sheet{

  .role{margin-top:10px;display:inline-block;font-size:12px;font-weight:600;letter-spacing:.04em;
    color:var(--teal-deep);background:#E7F4F1;border-radius:999px;padding:5px 12px}
  .pinmini{width:34px;height:34px;color:var(--teal);flex:none}
  .actions{margin-top:22px;display:flex;flex-direction:column;gap:10px}
  a.act{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    border:1px solid var(--line);border-radius:14px;padding:13px 15px;background:#fff;
    transition:transform .06s ease, border-color .15s ease}
  a.act:active{transform:scale(.985)}
  a.act .ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none;
    background:#EAF4F2;color:var(--teal)}
  a.act .ico svg{width:19px;height:19px}
  a.act .tt{display:flex;flex-direction:column;min-width:0}
  a.act .lb{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  a.act .vl{font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  a.act.zalo .ico{background:#eaf1fb;color:#0068ff}
  a.act.insta .ico{background:#fdeef4;color:#c13584}
  .save{margin-top:16px}
  button.savebtn{width:100%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    background:linear-gradient(158deg,var(--teal),var(--teal-deep));color:#fff;
    font-size:15px;font-weight:700;letter-spacing:.01em;border-radius:14px;padding:15px;
    box-shadow:0 8px 20px -8px rgba(11,92,85,.6)}
  button.savebtn:active{transform:scale(.99)}
  button.savebtn svg{width:19px;height:19px}
  .savehint{margin-top:8px;text-align:center;font-size:11.5px;color:var(--muted)}
  .foot{margin-top:22px;text-align:center;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9AAAA6}
