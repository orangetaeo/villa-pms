<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오프라인 — TRAVELDIARY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
      background: #F8FAFC;
      color: #1E293B;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #64748B; line-height: 1.6; max-width: 320px; }
    .retry {
      margin-top: 24px;
      padding: 12px 24px;
      background: #7C3AED;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .retry:hover { opacity: 0.9; }
    .tip {
      margin-top: 32px;
      padding: 16px;
      background: #F5F3FF;
      border-radius: 12px;
      max-width: 320px;
    }
    .tip p { font-size: 13px; color: #6D28D9; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>인터넷 연결이 필요해요</h1>
  <p>여행 일정을 불러오려면 네트워크 연결이 필요합니다. Wi-Fi나 데이터를 확인해 주세요.</p>
  <button class="retry" onclick="location.reload()">다시 시도</button>
  <div class="tip">
    <p>여행 중이라면 호텔/카페 Wi-Fi를 이용하거나, 현지 SIM 카드를 구매해 보세요.</p>
  </div>
</body>
</html>
