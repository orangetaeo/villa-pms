<style>

    --card:#FFFFFF;
    --ink:#22403C;
    --ink-soft:#5C7773;
    --line:#D8E6E3;
    --hero-ink:#FFFFFF;
    --hero-sub:#BFE0DB;
    --shadow:0 1px 3px rgba(9,59,54,.08);

  @media (prefers-color-scheme: dark){
    :root{
      --teal:#2FB5A8; --teal-deep:#062825; --teal-soft:#123E39; --orange:#F5A93C;
      --paper:#0C1917; --card:#132522; --ink:#DCEBE8; --ink-soft:#8FAAA5;
      --line:#1F3833; --hero-ink:#FFFFFF; --hero-sub:#9CCCC5; --shadow:0 1px 3px rgba(0,0,0,.35);
    }

  :root[data-theme="light"]{
    --teal:#0F9488; --teal-deep:#093B36; --teal-soft:#DCEEEB; --orange:#F5990E;
    --paper:#F7FAF9; --card:#FFFFFF; --ink:#22403C; --ink-soft:#5C7773;
    --line:#D8E6E3; --hero-ink:#FFFFFF; --hero-sub:#BFE0DB; --shadow:0 1px 3px rgba(9,59,54,.08);
  }
  :root[data-theme="dark"]{
    --teal:#2FB5A8; --teal-deep:#062825; --teal-soft:#123E39; --orange:#F5A93C;
    --paper:#0C1917; --card:#132522; --ink:#DCEBE8; --ink-soft:#8FAAA5;
    --line:#1F3833; --hero-ink:#FFFFFF; --hero-sub:#9CCCC5; --shadow:0 1px 3px rgba(0,0,0,.35);
  }

  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Noto Sans KR','Be Vietnam Pro','Segoe UI',system-ui,-apple-system,'Noto Sans Devanagari','Microsoft YaHei',sans-serif;
    font-size:16.5px; line-height:1.7;
  }
  .wrap{max-width:640px; margin:0 auto; padding:0 20px}

  .lang-bar{
    display:flex; flex-wrap:wrap; gap:6px; margin-bottom:30px;
  }
  .lang-bar button{
    appearance:none; border:1px solid rgba(255,255,255,.35); background:transparent;
    color:rgba(255,255,255,.78); font:inherit; font-size:12.5px; font-weight:600;
    padding:4px 12px; border-radius:99px; cursor:pointer; letter-spacing:.02em;
  }
  .lang-bar button[aria-pressed="true"]{background:#fff; color:var(--teal-deep); border-color:#fff}
  .lang-bar button:focus-visible{outline:2px solid var(--orange); outline-offset:1px}

  .hero{
    position:relative; background:var(--teal-deep); color:var(--hero-ink);
    padding:34px 0 56px; overflow:hidden;
  }
  .hero::after{
    content:""; position:absolute; right:-70px; bottom:-90px; width:320px; height:320px;
    background:radial-gradient(circle at 50% 42%, rgba(255,255,255,.06) 58%, transparent 59%);
    border-radius:50%;
  }
  .brand{display:flex; align-items:center; gap:14px; margin-bottom:34px}
  .brand svg{flex:0 0 auto}
  .brand-name{font-size:22px; font-weight:800; letter-spacing:.01em}
  .brand-tag{font-size:12.5px; color:var(--hero-sub); letter-spacing:.1em; text-transform:uppercase; font-weight:600}
  .hero h1{
    font-size:clamp(28px,7vw,38px); line-height:1.28; font-weight:800; margin:0 0 16px;
    letter-spacing:-.015em; text-wrap:balance;
  }
  .hero h1 em{font-style:normal; color:#7CE0D3}
  .hero p.lede{font-size:17.5px; color:var(--hero-sub); margin:0; max-width:34em}
  .hero .free-pill{
    display:inline-flex; align-items:center; gap:8px; margin-top:26px;
    background:var(--orange); color:#3A2400; font-weight:700; font-size:15px;
    padding:9px 18px; border-radius:99px; text-align:left;
  }

  section{padding:52px 0 8px}
  .eyebrow{
    font-size:12.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--teal); margin:0 0 10px;
  }
  h2{
    font-size:clamp(22px,5.4vw,27px); font-weight:800; line-height:1.32;
    margin:0 0 14px; letter-spacing:-.01em; text-wrap:balance;
  }
  .section-sub{color:var(--ink-soft); margin:0 0 28px; max-width:36em}

  .flow{display:flex; flex-direction:column; gap:0; margin:8px 0 24px}
  .flow-step{
    display:flex; gap:16px; align-items:flex-start;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:18px 18px; box-shadow:var(--shadow);
  }
  .flow-who{
    flex:0 0 auto; font-size:11.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    padding:4px 10px; border-radius:6px; margin-top:3px; white-space:nowrap;
  }
  .flow-who.you{background:var(--teal-soft); color:var(--teal)}
  .flow-who.us{background:var(--teal); color:#fff}
  .flow-body strong{display:block; font-size:16.5px; margin-bottom:2px}
  .flow-body span{color:var(--ink-soft); font-size:15px; line-height:1.6; display:block}
  .flow-arrow{align-self:center; color:var(--teal); padding:4px 0; line-height:1}
  .money-note{
    display:flex; gap:12px; align-items:flex-start;
    background:var(--teal-soft); border-radius:14px; padding:16px 18px; margin-top:20px;
    font-size:15.5px;
  }
  .money-note svg{flex:0 0 auto; margin-top:3px}

  .benefits{display:grid; grid-template-columns:1fr; gap:14px; margin-top:4px}
  @media (min-width:560px){.benefits{grid-template-columns:1fr 1fr}}
  .benefit{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:20px 20px 18px; box-shadow:var(--shadow);
  }
  .benefit .icon{
    width:42px; height:42px; border-radius:11px; background:var(--teal-soft);
    display:flex; align-items:center; justify-content:center; margin-bottom:14px;
  }
  .benefit h3{font-size:17px; font-weight:700; margin:0 0 6px; line-height:1.4}
  .benefit p{font-size:15px; color:var(--ink-soft); margin:0; line-height:1.65}

  .why{display:flex; flex-direction:column; gap:12px}
  .why-item{
    display:flex; gap:14px; align-items:flex-start;
    border-left:3px solid var(--teal); padding:2px 0 2px 16px;
  }
  .why-item strong{display:block; font-size:16.5px; margin-bottom:2px}
  .why-item p{margin:0; color:var(--ink-soft); font-size:15px}

  .steps{list-style:none; margin:8px 0 0; padding:0; counter-reset:step}
  .steps li{counter-increment:step; position:relative; padding:0 0 30px 56px}
  .steps li::before{
    content:counter(step); position:absolute; left:0; top:0;
    width:36px; height:36px; border-radius:50%;
    background:var(--teal); color:#fff; font-weight:800; font-size:16px;
    display:flex; align-items:center; justify-content:center;
    font-variant-numeric:tabular-nums;
  }
  .steps li::after{
    content:""; position:absolute; left:17px; top:42px; bottom:6px; width:2px;
    background:var(--line);
  }
  .steps li:last-child{padding-bottom:6px}
  .steps li:last-child::after{display:none}
  .steps strong{display:block; font-size:16.5px; margin-bottom:2px}
  .steps p{margin:0; color:var(--ink-soft); font-size:15px}

  .faq details{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    margin-bottom:10px; overflow:hidden;
  }
  .faq summary{
    cursor:pointer; padding:15px 18px; font-weight:700; font-size:15.5px;
    list-style:none; display:flex; justify-content:space-between; gap:12px; align-items:center;
  }
  .faq summary::-webkit-details-marker{display:none}
  .faq summary::after{
    content:"+"; color:var(--teal); font-size:20px; font-weight:600; line-height:1;
    transition:transform .15s ease;
  }
  @media (prefers-reduced-motion: reduce){.faq summary::after{transition:none}}
  .faq details[open] summary::after{transform:rotate(45deg)}
  .faq summary:focus-visible{outline:2px solid var(--teal); outline-offset:-2px; border-radius:12px}
  .faq .a{padding:0 18px 16px; color:var(--ink-soft); font-size:15px}
  .faq .a p{margin:0}

  .cta{
    background:var(--teal-deep); color:var(--hero-ink); border-radius:18px;
    padding:36px 26px; margin:56px 0 0; text-align:center;
  }
  .cta h2{color:#fff}
  .cta p{color:var(--hero-sub); margin:0 0 24px; font-size:15.5px}
  .cta .btns{display:flex; flex-direction:column; gap:10px; max-width:340px; margin:0 auto}
  .cta a{
    display:block; text-decoration:none; font-weight:700; font-size:16px;
    padding:14px 20px; border-radius:12px;
  }
  .cta a.primary{background:var(--orange); color:#3A2400}
  .cta a.login{background:#fff; color:var(--teal-deep)}
  .cta a.secondary{background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.3)}
  .cta a:focus-visible{outline:3px solid #fff; outline-offset:2px}
  .cta .url{font-size:14px; color:var(--hero-sub); margin-top:18px; letter-spacing:.03em}

  footer{padding:34px 0 44px; text-align:center; color:var(--ink-soft); font-size:13px}
</style>

function setLang(l){
  const dict = I18N[l] || I18N.ko;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (dict[k] !== undefined) el.innerHTML = dict[k];
  });
  const cta1 = document.getElementById('cta-primary');
  if (cta1 && dict.ctaB1Href) cta1.setAttribute('href', dict.ctaB1Href);
  document.querySelectorAll('.lang-bar button').forEach(b => {
    b.setAttribute('aria-pressed', String(b.getAttribute('data-setlang') === l));
  });
  document.documentElement.lang = l;
  document.documentElement.setAttribute('data-lang', l);
}
document.querySelectorAll('.lang-bar button').forEach(b => {
  b.addEventListener('click', () => setLang(b.getAttribute('data-setlang')));
});
setLang('ko');
